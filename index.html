<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHAOS - The Ultimate Meme Coin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><circle r="8" fill="red" stroke="white" stroke-width="2"/></svg>'), auto;
    }

    .noise {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0 0h100v100H0z" fill="white" fill-opacity="0.02"/></svg>');
      pointer-events: none;
      opacity: 0.2;
      z-index: 999;
      animation: slideNoise 1s linear infinite;
    }

    @keyframes slideNoise {
      0% { transform: translate(0, 0); }
      25% { transform: translate(2px, -1px); }
      50% { transform: translate(-1px, 2px); }
      75% { transform: translate(1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      z-index: 10;
    }

    .logo {
      font-size: 6rem;
      font-weight: 900;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
      animation: pulse 1.5s ease-in-out infinite alternate, bounce 2s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px #ff0000;
      animation: glitch 4s infinite linear alternate-reverse;
    }

    @keyframes glitch {
      0% { text-shadow: 0 0 5px #ff0000, 0 0 10px #00ff00, 0 0 15px #0000ff; }
      25% { text-shadow: 2px 0 5px #ff0000, -2px 0 10px #00ff00, 0 2px 15px #0000ff; }
      50% { text-shadow: -2px 0 5px #ff0000, 0 -2px 10px #00ff00, 0 -2px 15px #0000ff; }
      75% { text-shadow: 0 2px 5px #ff0000, 0 0 10px #00ff00, 2px 2px 15px #0000ff; }
      100% { text-shadow: 0 0 5px #ff0000, 0 0 10px #00ff00, -2px 0 15px #0000ff; }
    }

    p {
      max-width: 700px;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
      animation: shake 5s infinite linear;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2px, 0); }
      20% { transform: translate(4px, 0); }
      30% { transform: translate(-4px, 0); }
      40% { transform: translate(4px, 0); }
      50% { transform: translate(-4px, 0); }
      60% { transform: translate(4px, 0); }
      70% { transform: translate(-4px, 0); }
      80% { transform: translate(4px, 0); }
      90% { transform: translate(-4px, 0); }
    }

    .button {
      padding: 1rem 2rem;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 50px;
      border: 4px solid #fff;
      color: #fff;
      background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
      background-size: 300% 300%;
      animation: gradientShift 3s ease infinite, jiggle 0.5s ease-in-out infinite alternate;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
      cursor: pointer;
      text-transform: uppercase;
      margin: 0.5rem;
      transition: transform 0.2s;
    }

    .button:hover {
      transform: scale(1.1);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes jiggle {
      0% { transform: rotate(-2deg); }
      100% { transform: rotate(2deg); }
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .links a {
      color: #0ff;
      text-decoration: underline;
      font-size: 1.1rem;
      text-shadow: 0 0 5px #0ff;
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      20% { opacity: 0.5; }
      30% { opacity: 1; }
      70% { opacity: 0.8; }
      80% { opacity: 1; }
    }

    /* Floating chaotic elements */
    .chaos {
      position: absolute;
      font-size: 1.5rem;
      font-weight: bold;
      color: rgba(255, 0, 255, 0.8);
      text-shadow: 0 0 10px #ff00ff;
      pointer-events: none;
      animation: float 8s infinite ease-in-out, colorShift 10s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-50px) rotate(5deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(50px) rotate(-5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    @keyframes colorShift {
      0% { color: #ff00ff; }
      25% { color: #00ffff; }
      50% { color: #ffff00; }
      75% { color: #ff0000; }
      100% { color: #ff00ff; }
    }

    @media (max-width: 768px) {
      .logo {
        font-size: 4rem;
      }
      h1 {
        font-size: 2.2rem;
      }
      p {
        font-size: 1rem;
      }
      .button {
        padding: 0.8rem 1.5rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <section class="hero">
    <div class="logo">CHAOS</div>
    <h1>Embrace the Chaos</h1>
    <p>The only thing more insane than the market is this meme coin. Buy the dip, lose the dip, and never trust a chart that isn’t on fire.</p>

    <div class="links">
      <button class="button" onclick="alert('Pump button!')">
        💥 PUMP CHAOS
      </button>
      <button class="button" onclick="alert('Degen launchpad!')">
        🚀 LAUNCHPAD
      </button>
    </div>

    <div style="margin-top: 2rem;">
      <a href="#" target="_blank">Telegram</a> |
      <a href="#" target="_blank">Twitter</a> |
      <a href="#" target="_blank">DEX Screener</a>
    </div>
  </section>

  <script>
    // Random chaotic floating text
    const chaos = ["CHAOS", "BUY", "WAGMI", "GM", "FOMO", "RUG?", "MOON", "APES"];
    for (let i = 0; i < 25; i++) {
      const el = document.createElement("div");
      el.className = "chaos";
      el.textContent = chaos[Math.floor(Math.random() * chaos.length)];
      el.style.left = `${Math.random() * 100}vw`;
      el.style.top = `${Math.random() * 100}vh`;
      el.style.animationDelay = `${Math.random() * 5}s`;
      document.body.appendChild(el);
    }

    // Slight mouse jitters
    document.addEventListener("mousemove", (e) => {
      if (Math.random() > 0.98) {
        document.body.style.transform = `translate(${(Math.random() - 0.5) * 3}px, ${(Math.random() - 0.5) * 3}px)`;
        setTimeout(() => {
          document.body.style.transform = "";
        }, 100);
      }
    });
  </script>
</body>
</html>
